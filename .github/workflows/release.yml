# Trigger the shared sign-and-release workflow on version tags.
# This file goes in each skrpt repo as .github/workflows/release.yml

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    uses: skrpts/workflows/.github/workflows/release.yml@main
    secrets:
      SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
